[supervisord]
nodaemon=true
user=user

[program:run_ui]
command=/opt/venv-a0/bin/python /a0/run_ui.py --host=0.0.0.0 --port=7860 --dockerized=true
directory=/a0
autostart=true
autorestart=true
stdout_logfile=/a0/logs/run_ui.stdout.log
stderr_logfile=/a0/logs/run_ui.stderr.log

[program:the_listener]
command=/opt/venv-a0/bin/python /a0/exe/supervisor_event_listener.py
directory=/a0
autostart=true
autorestart=true
